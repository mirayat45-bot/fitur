function renderCodePanel(p,tab){return`<div class="formGroup"><label class="label">Custom ${tab.toUpperCase()}</label><textarea class="textarea codeDark" oninput="updateCustomCode('${tab}',this.value)">${escapeHtml(p.customCode[tab]||'')}</textarea></div><div class="row"><button class="btn" onclick="copyText(activeProject().customCode['${tab}']||'','${tab.toUpperCase()} copied')">Copy Code</button><button class="btn red" onclick="updateCustomCode('${tab}','')">Reset</button></div><div style="margin-top:12px">${codeWarnings(p,tab).map(w=>`<div class="stepLine">Warning — ${w}</div>`).join('')||'<div class="stepLine done">Tidak ada warning basic.</div>'}</div>`}
function seoScore(p){const items=[{label:'Title tidak kosong',ok:!!p.seo.title},{label:'Meta description minimal 80 karakter',ok:(p.seo.description||'').length>=80},{label:'Slug tidak kosong',ok:!!p.seo.slug},{label:'Focus keyword ada',ok:!!p.seo.focusKeyword},{label:'H1 / Hero ada',ok:p.blocks.some(b=>b.type==='hero'||b.type.includes('Hero'))},{label:'CTA link ada',ok:p.blocks.some(b=>b.buttonLink&&b.buttonLink!=='#')},{label:'OG title ada',ok:!!p.seo.ogTitle},{label:'OG image ada',ok:!!p.seo.ogImage},{label:'Minimal 3 block',ok:p.blocks.length>=3},{label:'Mobile preview aman',ok:true}];return{items,score:Math.round(items.filter(x=>x.ok).length/items.length*100)}}
function runChecklist(){const p=activeProject();const hasCTA=p.blocks.some(b=>b.buttonText);const items=[['Judul website sudah ada',!!p.name,'error'],['Meta description sudah ada',!!p.seo.description,'warning'],['Slug URL sudah ada',!!p.slug,'error'],['Minimal punya 3 block',p.blocks.length>=3,'warning'],['Hero section ada',p.blocks.some(b=>b.type==='hero'||b.type.includes('Hero')),'warning'],['CTA button ada',hasCTA,'warning'],['CTA link tidak kosong',p.blocks.some(b=>b.buttonLink&&b.buttonLink!=='#'),'warning'],['Nomor WhatsApp valid jika tombol WA dipakai',!p.blocks.some(b=>(b.type==='whatsapp'||b.buttonText.toLowerCase().includes('whatsapp'))&&!/^https:\/\/wa\.me\//.test(b.buttonLink)),'warning'],['Gambar tidak kosong jika block butuh gambar',true,'warning'],['Dark mode aman',true,'warning'],['Mobile responsive aman',true,'warning'],['Custom code tidak kosong/error basic',!codeWarnings(p,'js').length&&!codeWarnings(p,'css').length,'warning'],['SEO basic aman',seoScore(p).score>=70,'warning'],['Siap export/publish',true,'warning']];const ok=items.filter(i=>i[1]).length;const score=Math.round(ok/items.length*100);return{items,ok,warning:items.filter(i=>!i[1]&&i[2]==='warning').length,error:items.filter(i=>!i[1]&&i[2]==='error').length,score}}
function openChecklist(){const c=runChecklist();modal('Checklist Siap Publish',`<div class="card cardPad"><h2>Score: ${c.score}/100</h2><p>OK: ${c.ok} · Warning: ${c.warning} · Error: ${c.error}</p></div><div class="importSteps" style="margin-top:12px">${c.items.map(i=>`<div class="stepLine ${i[1]?'done':''}">${i[1]?'OK':i[2]==='error'?'Error':'Warning'} — ${i[0]}</div>`).join('')}</div>`,`<button class="btn" onclick="activePanel='seo';closeAllModals();render()">Perbaiki Sekarang</button><button class="btn green" ${c.score<80?'disabled':''} onclick="publishProject()">Publish</button>`)}

function progressImport(url){const steps=['Fetching URL','Taking Screenshot','Analyze Layout','Extract Color & Font','Detect Sections','Rewrite Content','Convert to Editable Blocks'];const body=`<p class="sub">Safe Mode aktif: Konten akan dibuat ulang agar tidak menyalin brand/desain secara mentah.</p><div id="importStepBox" class="importSteps">${steps.map(s=>`<div class="stepLine">${s}</div>`).join('')}</div><div id="importResult"></div>`;modal('Analyze URL',body,'<button class="btn" onclick="closeAllModals()">Tutup</button>');let i=0;const lines=[...document.querySelectorAll('#importStepBox .stepLine')];const int=setInterval(()=>{if(lines[i]){lines[i].classList.add('active');setTimeout(()=>{lines[i].classList.remove('active');lines[i].classList.add('done')},280)}i++;if(i>steps.length){clearInterval(int);lastImportResult={sections:['Navbar','Hero','Features','Pricing','FAQ','Footer'],colors:['#2563eb','#0f172a','#f59e0b'],font:'Inter / System',layout:url.includes('shop')?'E-commerce landing':'Modern landing'};document.getElementById('importResult').innerHTML=`<div class="card cardPad" style="margin-top:14px"><h3>Hasil Analisis</h3><p>Detected sections: ${lastImportResult.sections.join(', ')}</p><p>Suggested colors: ${lastImportResult.colors.join(', ')}</p><p>Suggested font: ${lastImportResult.font}</p><p>Layout style: ${lastImportResult.layout}</p><button class="btn primary" onclick="applyImport('replace')">Replace Current Page</button> <button class="btn" onclick="applyImport('merge')">Merge to Current Page</button></div>`}},620)}

function openNewProjectModal(){modal('Buat Project Baru',`<div class="formGroup"><label class="label">Nama Project</label><input id="newProjectName" class="input" value="Website Baru"></div><div class="formGroup"><label class="label">Slug</label><input id="newProjectSlug" class="input" value="website-baru"></div><div class="formGroup"><label class="label">Template Awal</label><select id="newProjectTemplate" class="select">${templates.map(t=>`<option value="${t.type}">${t.name}</option>`).join('')}</select></div>`,`<button class="btn" onclick="closeAllModals()">Batal</button><button class="btn primary" onclick="createProjectFromModal()">Buat & Buka Editor</button>`)}
function createProjectFromModal(){const name=document.getElementById('newProjectName').value||'Website Baru';const slug=document.getElementById('newProjectSlug').value||slugify(name);const tpl=document.getElementById('newProjectTemplate').value;const p=createProject(name,slug);p.blocks=templateBlocks(tpl);state.projects.unshift(p);state.activeProjectId=p.id;closeAllModals();toast('Project berhasil dibuat');saveState();go('editor')}
function templateBlocks(type){const types={printing:['navbar','hero','serviceList','productGrid','portfolio','testimonial','pricing','faq','footer'],jajan:['navbar','hero','catalog','promo','testimonial','faq','footer'],saas:['navbar','appHero','appPreview','features','pricingSaaS','faqSaaS','footer'],wedding:['invitationHero','couple','countdown','rsvp','gift','gallery','footer'],portfolio:['hero','portfolio','about','testimonial','contactForm','footer'],school:['navbar','hero','features','blogGrid','gallery','maps','footer'],digital:['hero','benefit','pricing','faq','cta','footer'],barber:['hero','serviceList','pricing','gallery','booking','footer'],company:['hero','about','vision','team','legal','footer'],event:['hero','schedule','portfolio','pricing','contactForm','footer']};return (types[type]||['navbar','hero','features','cta','footer']).map(makeBlock)}
function openTemplateLibrary(){const cards=templates.map((t,i)=>`<div class="blockCard"><div class="between"><b>${t.name}</b><span class="badge ${t.pro?'draft':'pub'}">${t.pro?'PRO':'FREE'}</span></div><p class="sub">${t.cat}</p><p>${t.style}</p><div class="row"><button class="btn small" onclick="templateDetail(${i})">Detail</button><button class="btn small primary" onclick="useTemplate(${i},'replace')">Use</button></div></div>`).join('');modal('Template Library',`<div class="formGroup"><input class="input" placeholder="Search template..."></div><div class="blockGrid">${cards}</div>`,'<button class="btn" onclick="closeAllModals()">Tutup</button>')}

function previewTemplate(i){const temp={...activeProject(),blocks:templateBlocks(templates[i].type),theme:activeProject().theme,seo:{...activeProject().seo,title:templates[i].name}};document.getElementById('previewMode').classList.add('show');document.getElementById('previewFrame').srcdoc=buildHTML(temp);setFullPreviewDevice('desktop')}

function openSnippetLibrary(){const has=!!selectedBlockId;const list=snippets.map((s,i)=>`<div class="blockCard"><b>${s[0]}</b><p class="sub">${s[2]}</p><button class="btn small primary" onclick="insertSnippet(${i})">Sisipkan</button></div>`).join('');modal('Snippet Library',`<div class="formGroup"><label class="label">Cara memasukkan snippet</label><select id="snippetMode" class="select"><option value="end">Add to End</option><option value="above" ${!has?'disabled':''}>Insert Above Selected Block</option><option value="below" ${!has?'disabled':''}>Insert Below Selected Block</option><option value="replace" ${!has?'disabled':''}>Replace Selected Block</option></select></div><div class="blockGrid">${list}</div>`,'<button class="btn" onclick="closeAllModals()">Tutup</button>')}

function openBlockLibrary(){let currentCat=Object.keys(blockCategories)[0];let search='';const body=`<input id="blockSearch" class="input" placeholder="Cari block, kategori, deskripsi..." oninput="filterBlockModal(this.value)"><div class="blockCats" id="blockCatTabs">${Object.keys(blockCategories).map((c,i)=>`<button class="pill ${i===0?'active':''}" onclick="selectBlockCat('${c.replace(/'/g,'')}')">${c}</button>`).join('')}</div><div id="blockResults"></div>`;modal('Tambah Block','<p class="sub">Pilih tipe konten yang ingin ditambahkan.</p>'+body,'<button class="btn" onclick="closeAllModals()">Tutup</button>');window.__blockCat=currentCat;window.__blockSearch=search;renderBlockResults()}

function iconFor(t){if(t.includes('hero'))return'🖼';if(t.includes('pricing')||t.includes('price'))return'💰';if(t.includes('faq'))return'❓';if(t.includes('form'))return'📧';if(t.includes('video'))return'▶';if(t.includes('footer'))return'🦶';if(t.includes('image')||t.includes('gallery'))return'🏞';if(t.includes('whatsapp'))return'💬';return'▧'}
function addBlockType(type){const p=activeProject();const b=makeBlock(type);p.blocks.push(b);selectedBlockId=b.id;closeAllModals();toast('Block berhasil ditambahkan');saveState();render()}

function moveBlock(id,dir){const p=activeProject();const i=p.blocks.findIndex(b=>b.id===id);if(i<0)return;const j=i+dir;if(j<0||j>=p.blocks.length)return;[p.blocks[i],p.blocks[j]]=[p.blocks[j],p.blocks[i]];saveState();render()}

function openProject(id){state.activeProjectId=id;saveState(false);go('editor')}
function previewProject(id){state.activeProjectId=id;openFullPreview()}
function duplicateProject(id){const p=state.projects.find(x=>x.id===id);if(!p)return;const c=JSON.parse(JSON.stringify(p));c.id=uid('project');c.name=p.name+' Copy';c.slug=p.slug+'-copy';c.status='Draft';c.createdAt=now();c.updatedAt=now();state.projects.unshift(c);toast('Project diduplikat');saveState();render()}
function deleteProject(id){if(!confirm('Hapus project?'))return;state.projects=state.projects.filter(p=>p.id!==id);if(!state.projects.length){const p=createProject();state.projects.push(p);state.activeProjectId=p.id}else if(state.activeProjectId===id)state.activeProjectId=state.projects[0].id;toast('Project dihapus');saveState();render()}
function publishProject(){activeProject().status='Published';closeAllModals();toast('Website berhasil dipublish demo');saveState();render()}
function openPublishModal(){const c=runChecklist();modal('Publish / Export',`<div class="card cardPad"><h2>Ready Score: ${c.score}/100</h2><p>Publish aktif jika score minimal 80.</p></div><div class="grid" style="grid-template-columns:repeat(2,1fr);margin-top:12px"><button class="btn" onclick="downloadHTML()">Export HTML</button><button class="btn" onclick="toast('Export ZIP tersedia di versi backend/PRO')">Export ZIP Demo</button><button class="btn" onclick="toast('Deploy Vercel demo')">Deploy to Vercel</button><button class="btn" onclick="toast('Deploy Netlify demo')">Deploy to Netlify</button><button class="btn" onclick="toast('Custom domain demo')">Custom Domain</button><button class="btn" onclick="toast('Backup project dibuat')">Backup Project</button></div>`,`<button class="btn" onclick="closeAllModals()">Tutup</button><button class="btn green" ${c.score<80?'disabled':''} onclick="publishProject()">Publish Website</button>`)}
function openFullPreview(){const p=activeProject();document.getElementById('previewMode').classList.add('show');document.getElementById('previewFrame').srcdoc=buildHTML(p);document.getElementById('previewInfo').textContent=p.name;setFullPreviewDevice(fullDevice)}
function closeFullPreview(){document.getElementById('previewMode').classList.remove('show')}
function setFullPreviewDevice(d){fullDevice=d;const f=document.getElementById('previewFrame');if(!f)return;const w={desktop:1180,laptop:1024,tablet:768,mobile:390}[d]||1180;f.style.width=w+'px';f.style.height='calc(100vh - 120px)'}
function applyCustomPreview(){const w=document.getElementById('customW').value||390;const h=document.getElementById('customH').value||844;const f=document.getElementById('previewFrame');f.style.width=w+'px';f.style.height=h+'px'}
function copyPreviewLink(){copyText('https://preview.skybuilder.id/'+activeProject().slug,'Preview link demo disalin')}
function openNewTabPreview(){const blob=new Blob([buildHTML(activeProject())],{type:'text/html'});window.open(URL.createObjectURL(blob),'_blank')}
function downloadHTML(){const blob=new Blob([buildHTML(activeProject())],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(activeProject().slug||'sky-builder-page')+'.html';a.click();toast('HTML berhasil diunduh')}
function buildHTML(p){const body=p.blocks.map(b=>renderBlockExport(b,p.theme)).join('\n')+(p.customCode.html||'');const s=p.seo;return`<!DOCTYPE html>\n<html lang="id">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>${escapeHtml(s.title||p.name)}</title>\n<meta name="description" content="${escapeAttr(s.description||'')}">\n<meta name="keywords" content="${escapeAttr(s.keywords||'')}">\n<meta name="robots" content="${escapeAttr(s.robots||'index, follow')}">\n<meta property="og:title" content="${escapeAttr(s.ogTitle||s.title||p.name)}">\n<meta property="og:description" content="${escapeAttr(s.ogDescription||s.description||'')}">\n${s.ogImage?`<meta property="og:image" content="${escapeAttr(s.ogImage)}">`:''}\n${s.favicon?`<link rel="icon" href="${escapeAttr(s.favicon)}">`:''}\n${p.customCode.header||''}\n<style>\n${exportCSS(p.theme)}\n${p.customCode.css||''}\n</style>\n</head>\n<body>\n${body}\n${p.customCode.footer||''}\n<script>\n${p.customCode.js||''}\n<\/script>\n</body>\n</html>`}
function renderBlockExport(b,theme){return`<div class="rendered">${renderBlock(b,0,false)}</div>`}
function exportCSS(t){return`:root{--cPrimary:${t.primary};--cSecondary:${t.secondary};--cAccent:${t.accent};--cBg:${t.background};--cText:${t.text};--cRadius:${t.radius}px;--cShadow:${t.shadow==='none'?'none':'0 12px 28px rgba(15,23,42,.10)'};--cont:${containerPx(t.containerWidth)};--bodyFont:${t.bodyFont};--headFont:${t.headingFont}}*{box-sizing:border-box}body{margin:0;font-family:var(--bodyFont);background:var(--cBg);color:var(--cText)}.rendered .container{max-width:var(--cont);margin:auto;padding:0 24px}.rendered .btnOut{background:var(--cPrimary);border-radius:var(--cRadius);color:#fff;padding:12px 18px;display:inline-block;font-weight:800;text-decoration:none}.rendered .cardOut{border-radius:var(--cRadius);box-shadow:var(--cShadow);border:1px solid #e2e8f0;background:#fff}.rendered h1,.rendered h2,.rendered h3{font-family:var(--headFont)}@media(max-width:700px){.rendered section{padding-left:0!important;padding-right:0!important}.rendered .container{padding:0 18px}.rendered h1{font-size:36px!important}}`}
function themeVars(t){return`--cPrimary:${t.primary};--cSecondary:${t.secondary};--cAccent:${t.accent};--cBg:${t.background};--cText:${t.text};--cRadius:${t.radius}px;--cShadow:${t.shadow==='none'?'none':'0 12px 28px rgba(15,23,42,.10)'};--cont:${containerPx(t.containerWidth)};--bodyFont:${t.bodyFont};--headFont:${t.headingFont};background:${t.background};color:${t.text};`}
function containerPx(x){return x==='narrow'?'760px':x==='wide'?'1180px':x==='full'?'100%':'980px'}
function uploadAsset(file){if(!file)return;const r=new FileReader();r.onload=()=>{state.assets=state.assets||[];state.assets.unshift({id:uid('asset'),name:file.name,data:r.result,type:file.type,cat:'Hero Image'});toast('Asset diupload');saveState();render()};r.readAsDataURL(file)}
function useAsset(id){const a=(state.assets||[]).find(x=>x.id===id);const b=activeProject().blocks.find(x=>x.id===selectedBlockId);if(a&&b){b.image=a.data;toast('Asset dipakai di block terpilih');saveState();go('editor')}else toast('Pilih block dulu')}
function deleteAsset(id){state.assets=state.assets.filter(a=>a.id!==id);saveState();render()}
function markLead(i){state.leads[i].status='Contacted';saveState();render()}
function deleteLead(i){state.leads.splice(i,1);saveState();render()}
function exportCSVLeads(){copyText('nama,wa,email,pesan,source,status\n'+state.leads.map(l=>[l.name,l.wa,l.email,l.msg,l.source,l.status].join(',')).join('\n'),'CSV demo disalin')}
function openModal(id){if(id==='versionModal')openVersionHistory()}
function openVersionHistory(){modal('Version History',`<div class="importSteps">${(state.versions||[]).map(v=>`<div class="stepLine"><b>${v.name}</b><br>${v.time} · ${v.blockCount} block <button class="btn small" onclick="restoreVersion('${v.id}')">Restore</button></div>`).join('')||'<div class="empty">Belum ada snapshot.</div>'}</div>`,'<button class="btn" onclick="closeAllModals()">Tutup</button>')}
function restoreVersion(id){const v=state.versions.find(x=>x.id===id);const p=activeProject();if(v&&p){p.blocks=JSON.parse(JSON.stringify(v.blocks));toast('Version restored');saveState();closeAllModals();go('editor')}}
function globalSearch(q){if(q.length>2)toast('Search demo: '+q)}
function modal(title,body,footer=''){const root=document.getElementById('modals');root.innerHTML=`<div class="modalBackdrop show"><div class="modal"><div class="modalHeader"><h2 style="margin:0">${title}</h2><button class="btn small" onclick="closeAllModals()">✕</button></div><div class="modalBody">${body}</div><div class="modalFooter">${footer}</div></div></div>`}
function closeAllModals(){document.getElementById('modals').innerHTML=''}
function toast(msg){const w=document.getElementById('toastWrap');const t=document.createElement('div');t.className='toast';t.textContent=msg;w.appendChild(t);setTimeout(()=>t.remove(),2600)}
function copyText(txt,msg='Disalin'){navigator.clipboard&&navigator.clipboard.writeText(txt).then(()=>toast(msg)).catch(()=>toast('Clipboard tidak tersedia'))}
function slugify(s){return String(s).toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'website-baru'}
function escapeHtml(s){return String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function escapeAttr(s){return escapeHtml(s).replace(/"/g,'&quot;')}
window.go=go;window.openNewProjectModal=openNewProjectModal;window.openImportModal=openImportModal;window.openTemplateLibrary=openTemplateLibrary;window.openSnippetLibrary=openSnippetLibrary;window.openBlockLibrary=openBlockLibrary;window.openChecklist=openChecklist;window.openCustomCodeModal=openCustomCodeModal;window.openFullPreview=openFullPreview;window.closeFullPreview=closeFullPreview;window.openPublishModal=openPublishModal;window.setDevice=setDevice;window.togglePanel=togglePanel;window.toggleSidebar=toggleSidebar;window.toggleSidebarCompact=toggleSidebarCompact;window.openProject=openProject;window.previewProject=previewProject;window.duplicateProject=duplicateProject;window.deleteProject=deleteProject;window.createProjectFromModal=createProjectFromModal;window.templateDetail=templateDetail;window.previewTemplate=previewTemplate;window.useTemplate=useTemplate;window.insertSnippet=insertSnippet;window.addBlockType=addBlockType;window.selectBlock=selectBlock;window.updateBlock=updateBlock;window.moveBlock=moveBlock;window.duplicateBlock=duplicateBlock;window.deleteBlock=deleteBlock;window.saveAsSnippet=saveAsSnippet;window.toggleHideBlock=toggleHideBlock;window.updateTheme=updateTheme;window.applyThemePreset=applyThemePreset;window.resetTheme=resetTheme;window.updateSeo=updateSeo;window.generateSeoDemo=generateSeoDemo;window.resetSeo=resetSeo;window.copyMetaTags=copyMetaTags;window.updateCustomCode=updateCustomCode;window.setFullPreviewDevice=setFullPreviewDevice;window.applyCustomPreview=applyCustomPreview;window.openNewTabPreview=openNewTabPreview;window.copyPreviewLink=copyPreviewLink;window.downloadHTML=downloadHTML;window.publishProject=publishProject;window.applyImport=applyImport;window.progressImport=progressImport;window.uploadAsset=uploadAsset;window.useAsset=useAsset;window.deleteAsset=deleteAsset;window.markLead=markLead;window.deleteLead=deleteLead;window.exportCSVLeads=exportCSVLeads;window.openModal=openModal;window.restoreVersion=restoreVersion;window.globalSearch=globalSearch;window.closeAllModals=closeAllModals;window.copyText=copyText;window.toast=toast;window.activeProject=activeProject;
render();
})();
</script>
